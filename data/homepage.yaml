updates:
  title: "Latest from LeMaterial"
  items:
    - date: "2026-02-20"
      title: "LeMat-GenBench released"
      description: "LeMat-GenBench is now released with a public leaderboard on Hugging Face."
      label: "View leaderboard"
      url: "https://huggingface.co/spaces/LeMaterial/LeMat-GenBench"
      external: true
    - date: "2025-11-26"
      title: "Reading Group sessions are live"
      description: "Join recurring discussions on AI for materials science with paper walkthroughs and open Q&A."
      label: "See sessions"
      url: "/docs/reading-group/"
      external: false
    - date: "2025-10-10"
      title: "LeMat datasets are available on Hugging Face"
      description: "Explore LeMat-Bulk, LeMat-BulkUnique, LeMat-Traj, and LeMat-Synth from a single open hub."
