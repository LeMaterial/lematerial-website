contribute:
  title: "Contribute to LeMaterial"
  intro: "Bring your ideas, datasets, models, or tooling. We welcome contributions from students, researchers, and practitioners."
  cards:
    - title: "Join the Community"
      description: "Connect with contributors, ask questions, and follow ongoing initiatives in Slack."
      label: "Join Slack"
      url: "https://join.slack.com/t/lematerial/shared_invite/zt-3isyxmscz-2Gq5x6aRhYaeauMQmo~SCQ"
      external: true
    - title: "Propose a Project"
      description: "Share a benchmark, dataset, or tooling idea and help shape upcoming collaborative work."
      label: "Submit an idea"
      url: "https://docs.google.com/forms/d/e/1FAIpQLSfTIMVBLD2x62A32AGQ8PlCZamIUh3zrCr8lZlsEQmBX7HqYA/viewform"
      external: true
    - title: "Contribute on GitHub"
      description: "Open issues or pull requests across LeMaterial projects, from datasets and models to tooling and infrastructure."
      label: "Browse projects"
      url: "https://github.com/lematerial"
      external: true

newsletter:
