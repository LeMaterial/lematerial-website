hero:
  title: "LeMaterial"
  lead: "LeMaterial builds open, high-quality datasets and reproducible workflows so materials ML research is easier to start, compare, and extend."
  support: "A collaboration between academia, industry, and open-science communities."
  actions:
    - label: "Explore datasets"
      url: "/docs/about/datasets/"
      variant: "primary"
    - label: "Slack"
      url: "https://join.slack.com/t/lematerial/shared_invite/zt-3isyxmscz-2Gq5x6aRhYaeauMQmo~SCQ"
      variant: "outline"
      external: true
    - label: "Join LeMaterial"
      url: "https://docs.google.com/forms/d/e/1FAIpQLSd1v4yn5mxYL6QCCW33o7lRB37-MAFfLDXmpTN1nlhsYEGmTg/viewform"
      variant: "outline"
      external: true

updates:
  title: "Latest updates"
  intro: "Recent milestones across datasets and tooling, with the newest highlight first."
  items:
    - date: "2026-02-27"
      title: "LeMaterial LLM-synthesis workflows updated"
      description: "Recent work in the LLM synthesis repository expands project capabilities for synthesis-focused research workflows."
      label: "View repository update"
      url: "https://github.com/LeMaterial/lematerial-llm-synthesis"
      external: true
    - date: "2026-02-20"
      title: "LeMat-GenBench released"
      description: "LeMat-GenBench is now released with a public leaderboard hosted on Hugging Face."
      label: "View leaderboard"
      url: "https://huggingface.co/spaces/LeMaterial/LeMat-GenBench"
      external: true
    - date: "2026-02-18"
      title: "LeMat-Synth-Papers released on Hugging Face"
      description: "A dedicated synthesis-paper dataset release extending the LeMat-Synth line for document-centered workflows."
      label: "View dataset card"
      url: "https://huggingface.co/datasets/LeMaterial/LeMat-Synth-Papers"
      external: true

contribute:
  title: "How to engage with LeMaterial"
  intro: "Choose where to start, then move directly to the right resource."
  cards:
    - title: "Understand the mission"
      description: "Read scope, principles, governance, and how LeMaterial fits in the materials ML ecosystem."
      label: "Read mission"
      url: "/docs/about/the-mission/"

    - title: "Join active collaboration"
      description: "Join Slack, introduce your interests, and connect to active dataset and tooling efforts."
      label: "How to join"
      url: "/docs/about/how-to-join/"

    - title: "Propose a project"
      description: "Submit a project idea for datasets, benchmarks, workflows, or community infrastructure."
      label: "Suggest a project"
      url: "https://docs.google.com/forms/d/e/1FAIpQLSfTIMVBLD2x62A32AGQ8PlCZamIUh3zrCr8lZlsEQmBX7HqYA/viewform"
      external: true

